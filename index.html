/* ================== OCR ================== */
async function renderOcr(main){
  main.innerHTML = `<div class="tool-page" style="max-width:1000px">${toolHead('ocr')}<div id="ocard"></div></div>`;
  const card = document.getElementById('ocard');
  let file=null, pdf=null, lang='ara+eng', running=false, results='';

  function paint(){
    if (!file){ card.innerHTML = `<div class="card">${dropzone({onFiles: async fs => { file=fs[0]; try { pdf=await loadPdfJs(await file.arrayBuffer()); } catch { toast(tt('errors.invalid'),'error'); file=null; paint(); return; } results=''; paint(); }})}</div>`; return; }
    card.innerHTML = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <div><div style="font-weight:600">${file.name}</div><div style="color:var(--muted);font-size:13px">${tt('ocr.pages')}: ${pdf.numPages}</div></div>
          <button class="btn btn-outline btn-sm" id="oClr">${tt('actions.clear')}</button>
        </div>
        <div class="field"><label>${tt('ocr.language')}</label>
          <select class="select" id="oLang">
            <option value="ara+eng" ${lang==='ara+eng'?'selected':''}>${tt('ocr.langArEn')}</option>
            <option value="ara" ${lang==='ara'?'selected':''}>${tt('ocr.langAr')}</option>
            <option value="eng" ${lang==='eng'?'selected':''}>${tt('ocr.langEn')}</option>
          </select>
        </div>
        <button class="btn" style="width:100%" id="oRun" ${running?'disabled':''}>${svg('ocr')} ${tt('ocr.action')}</button>
        <div id="oStatus" style="font-size:13px;color:var(--muted);margin-top:10px;min-height:18px"></div>
        <div id="oProg" style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;display:none"><div id="oProgBar" style="height:100%;width:0;background:var(--brand);transition:width .25s"></div></div>
        ${results?`<div style="margin-top:14px"><label style="font-weight:600;font-size:13px;display:block;margin-bottom:6px">${tt('ocr.action')} — ${tt('actions.done')}</label><textarea id="oOut" class="input" style="min-height:240px;font-family:ui-monospace,monospace;font-size:13px;white-space:pre-wrap" readonly>${results.replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</textarea><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-outline" style="flex:1" id="oCopy">${tt('ocr.copy')}</button><button class="btn" style="flex:1" id="oDl">${svg('arrowDown')} ${tt('ocr.download')}</button></div></div>`:''}
        <p style="font-size:12px;color:var(--muted);margin:10px 0 0">${tt('ocr.note')}</p>
      </div>`;
    document.getElementById('oClr').onclick = () => { file=null; pdf=null; results=''; paint(); };
    document.getElementById('oLang').onchange = e => lang = e.target.value;
    document.getElementById('oRun').onclick = doRun;
    if (results){
      document.getElementById('oCopy').onclick = async () => { try { await navigator.clipboard.writeText(results); toast(tt('ocr.copied')); } catch { toast(tt('errors.generic'),'error'); } };
      document.getElementById('oDl').onclick = () => {
        const blob = new Blob([results], {type:'text/plain;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href=url; a.download = deriveName(file.name,'ocr').replace(/\.pdf$/i,'.txt');
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      };
    }
  }

  async function loadTesseract(){
    if (window.Tesseract) return window.Tesseract;
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
      s.onload = () => resolve(window.Tesseract);
      s.onerror = () => reject(new Error('tesseract load failed'));
      document.head.appendChild(s);
    });
  }

  async function doRun(){
    if (running) return;
    running = true;
    const status = document.getElementById('oStatus');
    const prog = document.getElementById('oProg');
    const bar = document.getElementById('oProgBar');
    const btn = document.getElementById('oRun');
    btn.disabled = true; prog.style.display='block'; bar.style.width='0%';
    status.textContent = tt('ocr.loading');
    try {
      const Tesseract = await loadTesseract();
      const worker = await Tesseract.createWorker(lang, 1, {
        logger: m => {
          if (m.status === 'recognizing text' && typeof m.progress === 'number'){
            // page progress is mixed with overall — kept lightweight
          }
        }
      });
      let out = '';
      for (let i=1; i<=pdf.numPages; i++){
        status.textContent = `${tt('ocr.processing')} ${i} / ${pdf.numPages}`;
        const p = await pdf.getPage(i);
        const vp = p.getViewport({scale:2});
        const c = document.createElement('canvas');
        c.width = vp.width; c.height = vp.height;
        const ctx = c.getContext('2d');
        await p.render({canvasContext:ctx, viewport:vp, canvas:c}).promise;
        const { data:{ text } } = await worker.recognize(c);
        out += `--- ${tt('ocr.pages')} ${i} ---\n${text.trim()}\n\n`;
        bar.style.width = ((i/pdf.numPages)*100)+'%';
      }
      await worker.terminate();
      results = out.trim();
      status.textContent = tt('actions.done');
      toast(tt('actions.done'));
    } catch(e){
      console.error(e);
      status.textContent = '';
      toast(tt('errors.generic'),'error');
    } finally {
      running = false;
      btn.disabled = false;
      paint();
    }
  }

  paint();
}

      const buf = await file.arrayBuffer();

      const out = await PDFDocument.create();
      const pp = await out.copyPages(src, src.getPageIndices());
      pp.forEach(p=>out.addPage(p));

      document.getElementById('jor').onchange = e => orient = e.target.value;
      document.getElementById('jdo').onclick = doIt;
    }
  }
  window.__j_rm = i => { imgs.splice(i,1); paint(); };
  const SIZES = {A4:[595.28,841.89], Letter:[612,792], Legal:[612,1008], A3:[841.89,1190.55], A5:[419.53,595.28]};
  async function doIt(){
    const btn = document.getElementById('jdo'); btn.disabled = true;
    try {
      const doc = await PDFDocument.create();
      for (const f of imgs){
        const buf = await f.arrayBuffer();
        const img = /png/i.test(f.type) ? await doc.embedPng(buf) : await doc.embedJpg(buf.slice(0));
        let pw, ph;
        if (pageSize === 'Auto'){ pw = img.width; ph = img.height; }
        else { let [w,h] = SIZES[pageSize]; if (orient==='landscape') [w,h]=[h,w]; pw=w; ph=h; }
        const page = doc.addPage([pw, ph]);
        const ar = img.width/img.height; let dw, dh;
        const margin = pageSize==='Auto'?0:30;
        const aw = pw-margin*2, ah = ph-margin*2;
        if (aw/ah > ar){ dh = ah; dw = ah*ar; } else { dw = aw; dh = aw/ar; }
        page.drawImage(img, {x:(pw-dw)/2, y:(ph-dh)/2, width:dw, height:dh});
      }
      downloadBytes(await doc.save(), 'images.pdf');
      toast(tt('actions.done'));
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }
  paint();
}

/* ================== PDF TO JPG ================== */
function renderPdfToJpg(main){
  main.innerHTML = `<div class="tool-page">${toolHead('pdfToJpg')}<div class="card" id="pjcard"></div></div>`;
  const card = document.getElementById('pjcard');
  let file=null, scale=2;

  function paint(){
    if (!file){ card.innerHTML = dropzone({onFiles:fs=>{file=fs[0]; paint();}}); return; }
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-weight:600">${file.name}</div><button class="btn btn-outline btn-sm" onclick="window.__pj_clr()">${tt('actions.clear')}</button></div>
      <div class="field"><label>${tt('pdfToJpg.quality')} <span style="color:var(--muted);font-weight:400" id="pjsL">${Math.round(scale*72)} DPI</span></label><input type="range" min="1" max="4" step="0.5" value="${scale}" id="pjs"/></div>
      <button class="btn btn-block" id="pjdo">${svg('pdfToJpg')} ${tt('pdfToJpg.action')}</button>
    `;
    document.getElementById('pjs').oninput = e => { scale=+e.target.value; document.getElementById('pjsL').textContent = Math.round(scale*72)+' DPI'; };
    document.getElementById('pjdo').onclick = doIt;
  }
  window.__pj_clr = () => { file=null; paint(); };
  async function doIt(){
    const btn = document.getElementById('pjdo'); btn.disabled = true; btn.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> ${tt('actions.processing')}`;
    try {
      const pdf = await loadPdfJs(await file.arrayBuffer());
      const zip = new JSZip();
      const base = file.name.replace(/\.pdf$/i,'');
      for (let i=1; i<=pdf.numPages; i++){
        const p = await pdf.getPage(i);
        const vp = p.getViewport({scale});
        const c = document.createElement('canvas');
        c.width = vp.width; c.height = vp.height;
        const ctx = c.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
        await p.render({canvasContext:ctx, viewport:vp, canvas:c}).promise;
        const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.92));
        zip.file(`${base}-page-${String(i).padStart(3,'0')}.jpg`, blob);
      }
      const out = await zip.generateAsync({type:'blob'});
      downloadBlob(out, base+'-images.zip');
      toast(tt('actions.done'));
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; paint(); }
  }
  paint();
}

/* ================== EXTRACT TEXT ================== */
async function renderExtractText(main){
  main.innerHTML = `<div class="tool-page">${toolHead('extractText')}<div class="card" id="etcard"></div></div>`;
  const card = document.getElementById('etcard');
  let file=null, text='';

  async function paint(){
    if (!file){ card.innerHTML = dropzone({onFiles: async fs => { file=fs[0]; await extract(); }}); return; }
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:center;flex-wrap:wrap;gap:8px">
        <div><div style="font-weight:600">${file.name}</div><div style="color:var(--muted);font-size:13px">${text.length} chars</div></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="window.__et_clr()">${tt('actions.clear')}</button>
          <button class="btn btn-outline btn-sm" id="etcp">${svg('copy')} ${tt('extractText.copy')}</button>
          <button class="btn btn-sm" id="etdl">${svg('download')} ${tt('extractText.download')}</button>
        </div>
      </div>
      ${text ? `<textarea class="textarea" dir="auto" style="height:480px;font-family:ui-monospace,'Segoe UI',Tahoma,sans-serif;font-size:14px;unicode-bidi:plaintext;line-height:1.6" readonly>${escapeHtml(text)}</textarea>` : `<p style="color:var(--muted);text-align:center;padding:30px 0">${tt('extractText.empty')}</p>`}
    `;
    if (text){
      document.getElementById('etcp').onclick = () => { navigator.clipboard.writeText(text); toast(tt('extractText.copied')); };
      document.getElementById('etdl').onclick = () => downloadBlob(new Blob([text],{type:'text/plain;charset=utf-8'}), deriveName(file.name,'text','txt'));
    }
  }
  window.__et_clr = () => { file=null; text=''; paint(); };
  async function extract(){
    card.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    try {
      const pdf = await loadPdfJs(await file.arrayBuffer());
      let out = '';
      for (let i=1; i<=pdf.numPages; i++){
        const p = await pdf.getPage(i);
        const c = await p.getTextContent();
        out += extractPageText(c) + '\n\n';
      }
      text = out.trim();
      paint();
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); file=null; paint(); }
  }
  paint();
}

/* Arabic-aware page text extraction.
   PDF.js typically returns Arabic text items where:
   - Each item's `str` is in the order glyphs appear in the PDF stream.
   - For Arabic that was rendered using presentation-form glyphs (FExx/FBxx),
     this stream order is the visual left-to-right glyph order, which means
     the characters are in REVERSE LOGICAL order. We detect this and reverse
     the string within those items.
   - Within a line we sort items by X. For RTL lines we then reverse the
     item order so the right-most item (logical first) comes first.
   - We expand lam-alef ligatures and strip tatweel.
   - The output is in proper Unicode logical order. The textarea uses
     `dir=auto` + `unicode-bidi:plaintext` so the browser renders it correctly. */
function extractPageText(content){
  const isArabicChar = ch => {
    const code = ch.codePointAt(0);
    return (code>=0x0600 && code<=0x06FF) || (code>=0xFB50 && code<=0xFDFF) || (code>=0xFE70 && code<=0xFEFF);
  };
  const hasPresentationForms = s => /[\uFB50-\uFDFF\uFE70-\uFEFF]/.test(s);

  // Build raw items: { str, x, y, w, h, isAr, wasVisual }
  const items = content.items.filter(it => it && it.str != null).map(it => {
    const tr = it.transform || [1,0,0,1,0,0];
    const raw = it.str || '';
    const wasVisual = hasPresentationForms(raw);
    let str = normalizeArabicChars(raw);
    // If the source used presentation forms, the chars are visually ordered LTR
    // which equals reverse of logical for RTL — reverse to get logical order.
    if (wasVisual && /[\u0600-\u06FF]/.test(str)){
      str = [...str].reverse().join('');
    }
    // Expand lam-alef AFTER reversal so the lam stays before alef logically.
    str = expandLamAlef(str);
    // Strip tatweel (purely cosmetic kashida elongation)
    str = str.replace(/\u0640/g, '');
    return { str, x: tr[4], y: tr[5], w: it.width||0, h: it.height||Math.abs(tr[3])||10, hasEOL: it.hasEOL };
  }).filter(it => it.str.length || it.hasEOL);

  if (!items.length) return '';

  // Group into lines by Y position (PDF y-axis is bottom-up)
  const lines = [];
  const sorted = items.slice().sort((a,b) => b.y - a.y);
  for (const it of sorted){
    let placed = false;
    for (const ln of lines){
      const tol = Math.max(2, ln.h * 0.5);
      if (Math.abs(ln.y - it.y) <= tol){
        ln.items.push(it);
        ln.h = Math.max(ln.h, it.h);
        placed = true; break;
      }
    }
    if (!placed) lines.push({ y: it.y, h: it.h, items: [it] });
  }

  const out = [];
  for (const ln of lines){
    const lineText = ln.items.map(i => i.str).join('');
    const arCount = [...lineText].filter(isArabicChar).length;
    const latCount = [...lineText].filter(c => /[A-Za-z]/.test(c)).length;
    const isRTL = arCount > 0 && arCount >= latCount;
    ln.items.sort((a,b) => a.x - b.x);
    const ordered = isRTL ? ln.items.slice().reverse() : ln.items;
    let line = '';
    for (let k=0; k<ordered.length; k++){
      const it = ordered[k];
      if (k > 0){
        const prev = ordered[k-1];
        const gap = isRTL ? (prev.x - (it.x + it.w)) : (it.x - (prev.x + prev.w));
        const avgChar = Math.max(2, (prev.w / Math.max(1, prev.str.length)));
        if (gap > avgChar * 0.3 && !/\s$/.test(line) && !/^\s/.test(it.str)) line += ' ';
      }
      line += it.str;
    }
    out.push(line.trim());
  }
  return out.join('\n');
}

/* Normalize Arabic characters: convert presentation forms back to base
   letters using NFKC, plus a few targeted patches. Does not change ordering. */
function normalizeArabicChars(s){
  if (!s) return s;
  let out;
  try { out = s.normalize('NFKC'); } catch { out = s; }
  return out;
}
/* Expand lam-alef ligatures (FEFB–FEFC etc.) back to two characters. NFKC
   already handles most of them, but some PDFs use the compatibility forms
   which need explicit mapping. */
function expandLamAlef(s){
  return s
    .replace(/[\uFEFB\uFEFC]/g, '\u0644\u0627')
    .replace(/[\uFEF7\uFEF8]/g, '\u0644\u0623')
    .replace(/[\uFEF9\uFEFA]/g, '\u0644\u0625')
    .replace(/[\uFEF5\uFEF6]/g, '\u0644\u0622');
}
function normalizeArabic(s){ return expandLamAlef(normalizeArabicChars(s||'').replace(/\u0640/g,'')); }

function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function hexToRgb(c){ const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(c||''); if (!m) return [0.1,0.1,0.3]; return [parseInt(m[1],16)/255,parseInt(m[2],16)/255,parseInt(m[3],16)/255]; }

render();
