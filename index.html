<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self' blob: https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net;" />
    <title>PDF Studio - Academic Edition</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app">
    <header class="header">
        <div class="brand" onclick="nav('home')">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <span id="brandName">PDF Studio</span>
        </div>
        <nav class="nav" id="topNav">
            <!-- Nav items will be rendered by JS -->
        </nav>
        <div class="header-right">
            <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="lang-btn" id="langBtn" onclick="toggleLang()">
                <span id="langLabel">AR</span>
            </button>
        </div>
    </header>

    <main id="main">
        <!-- Content will be injected here by app.js -->
    </main>

    <footer class="footer" id="appFooter">
        <!-- Footer will be injected here by app.js -->
    </footer>

    <!-- Modals & Toasts -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3></h3>
            <div class="modal-body"></div>
            <div class="modal-foot"></div>
        </div>
    </div>
    <div id="toastWrap"></div>

    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader"></div>
    </div>

    <!-- Local Libraries: PDF.js exposes globals via module init so app.js can use pdfjsLib -->
    <script type="module">
        import * as pdfjsLib from './libs/pdf.min.mjs';
        pdfjsLib.GlobalWorkerOptions.workerSrc = new URL('./libs/pdf.worker.min.mjs', import.meta.url).href;
        window.pdfjsLib = pdfjsLib;
    </script>
    <script defer src="libs/pdf-lib.min.js"></script>
    <script defer src="libs/mammoth.browser.min.js"></script>
    <script defer src="libs/tesseract.min.js"></script>
    <script defer src="libs/jszip.min.js"></script>
    <script defer src="libs/FileSaver.min.js"></script>
    <script defer src="libs/sortable.min.js"></script>
    <script defer src="libs/signature_pad.umd.min.js"></script>
    <script defer src="libs/konva.min.js"></script>
    
    <!-- Main Application Logic -->
    <script defer src="js/app.js"></script>
</body>
</html>
