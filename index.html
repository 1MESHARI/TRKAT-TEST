<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PDF Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --fg:#0d1733; --muted:#6b7280; --border:#e5e9f2;
    --primary:#1e40af; --primary-fg:#ffffff; --primary-soft:#e8eefb;
    --primary-hover:#1c3aa1;
    --accent:#0ea5e9; --danger:#dc2626; --success:#16a34a; --warn:#d97706;
    --shadow:0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg:0 10px 30px -12px rgba(15,23,42,.18), 0 2px 6px rgba(15,23,42,.06);
    --radius:10px;
  }
  html.dark{
    --bg:#0b1020; --card:#141a2e; --fg:#eef2ff; --muted:#94a3b8; --border:#222a44;
    --primary:#3b82f6; --primary-fg:#ffffff; --primary-soft:#1a2447;
    --primary-hover:#4f8ffa;
    --accent:#38bdf8;
    --shadow:0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
    --shadow-lg:0 12px 30px -10px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:'Cairo','Inter',system-ui,sans-serif;
    background:var(--bg); color:var(--fg);
    line-height:1.55; font-size:15px;
    -webkit-font-smoothing:antialiased;
  }
  html[lang="en"] body{font-family:'Inter','Cairo',system-ui,sans-serif}
  a{color:var(--primary); text-decoration:none}
  button{font-family:inherit; cursor:pointer}
  input,select,textarea{font-family:inherit; color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}

  /* Layout */
  .app{display:flex; flex-direction:column; min-height:100vh}
  .header{
    position:sticky; top:0; z-index:50; height:64px;
    background:var(--card);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 22px; gap:18px;
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; cursor:pointer; color:var(--primary)}
  .brand-mark{
    width:36px;height:36px;border-radius:9px;
    background:var(--primary);
    color:#fff; display:flex; align-items:center; justify-content:center;
  }
  .brand-mark svg{width:20px;height:20px}
  .nav{display:flex; gap:2px; margin-inline-start:8px}
  .nav-btn{
    background:transparent; border:0; color:var(--muted);
    padding:8px 14px; border-radius:7px; font-size:14px; font-weight:600;
    display:inline-flex; align-items:center; gap:6px; position:relative;
  }
  .nav-btn:hover{color:var(--primary)}
  .nav-btn.active{color:var(--primary)}
  .nav-btn.active::after{
    content:''; position:absolute; left:14px; right:14px; bottom:-22px; height:3px;
    background:var(--primary); border-radius:3px 3px 0 0;
  }
  .header-right{margin-inline-start:auto; display:flex; align-items:center; gap:6px}
  .icon-btn{
    background:transparent; border:1px solid transparent; color:var(--fg);
    width:38px; height:38px; border-radius:9px;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover{background:var(--primary-soft); color:var(--primary)}
  .icon-btn svg{width:18px;height:18px}
  .lang-btn{
    background:var(--card); border:1.5px solid var(--primary); color:var(--primary);
    height:38px; padding:0 14px; border-radius:9px; font-weight:700; font-size:13px;
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    transition:all .15s ease;
  }
  .lang-btn:hover{background:var(--primary); color:#fff}

  main{flex:1; padding:48px 22px 60px; max-width:1200px; width:100%; margin:0 auto}

  /* Hero */
  .hero{text-align:center; margin-bottom:28px}
  .hero h1{
    font-size:clamp(28px,4.6vw,46px); font-weight:800; margin:0 0 12px;
    letter-spacing:-.02em; line-height:1.2; color:var(--fg);
  }
  .hero h1 .dot{color:var(--primary)}
  .hero p{font-size:16px; color:var(--muted); max-width:620px; margin:0 auto}

  .dropzone{
    margin:30px auto 0; max-width:760px;
    background:var(--card); border:2px dashed color-mix(in srgb,var(--primary) 35%,var(--border)); border-radius:14px;
    padding:46px 24px 38px; text-align:center; cursor:pointer;
    transition:all .15s ease;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--primary); background:var(--primary-soft);
  }
  .dropzone-icon{
    width:62px;height:62px;border-radius:50%;
    background:var(--primary-soft); color:var(--primary);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 14px;
  }
  .dropzone-icon svg{width:30px;height:30px}
  .dropzone .lead{font-size:18px; font-weight:700; margin:0 0 4px; color:var(--fg)}
  .dropzone .sub{font-size:14px; color:var(--muted); margin:0 0 18px}
  .dropzone .pick-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--primary); color:#fff; border:0; padding:12px 30px;
    border-radius:8px; font-size:15px; font-weight:700; cursor:pointer;
    transition:background .15s;
  }
  .dropzone .pick-btn:hover{background:var(--primary-hover)}

  /* Sections */
  .section{margin-top:60px}
  .section-head{margin-bottom:22px; text-align:center}
  .section-head h2{margin:0 0 6px; font-size:24px; font-weight:800; letter-spacing:-.01em; color:var(--fg)}
  .section-head p{margin:0; font-size:14px; color:var(--muted)}

  .grid{display:grid; gap:16px;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  }
  .tool{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; cursor:pointer; transition:all .15s ease;
    text-align:start; position:relative; min-height:120px;
    display:flex; flex-direction:column; gap:8px;
  }
  .tool:hover{
    border-color:var(--primary);
    box-shadow:var(--shadow-lg);
    transform:translateY(-2px);
  }
  .tool-icon{
    width:36px;height:36px;border-radius:8px;
    background:var(--primary-soft); color:var(--primary);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    margin-bottom:6px;
  }
  .tool-icon svg{width:18px;height:18px}
  .tool h3{margin:0; font-size:15px; font-weight:700; color:var(--fg)}
  .tool p{margin:0; font-size:13px; color:var(--muted); line-height:1.5}

  /* Tool page */
  .tool-page{max-width:880px; margin:0 auto}
  .page-head{margin-bottom:24px}
  .page-head .back{
    display:inline-flex; align-items:center; gap:6px; color:var(--muted);
    background:none; border:0; padding:6px 0 14px; font-size:14px;
  }
  .page-head .back:hover{color:var(--primary)}
  .page-head h1{margin:0 0 6px; font-size:30px; font-weight:800; letter-spacing:-.02em}
  .page-head p{margin:0; color:var(--muted); font-size:15px}

  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px}
  .card + .card{margin-top:16px}

  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px}
  .field label{font-size:13px; font-weight:600; color:var(--fg)}
  .input, .select, .textarea{
    background:var(--bg); border:1px solid var(--border); border-radius:9px;
    padding:9px 12px; font-size:14px; color:var(--fg); width:100%;
    transition:border-color .15s;
  }
  .input:focus, .select:focus, .textarea:focus{outline:none; border-color:var(--primary)}
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .row > *{flex:1; min-width:0}

  .btn{
    background:var(--primary); color:var(--primary-fg); border:0;
    padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:all .15s;
  }
  .btn:hover:not(:disabled){background:var(--primary-hover)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.5; cursor:not-allowed}
  .btn svg{width:16px;height:16px}
  .btn-block{width:100%; padding:13px}
  .btn-outline{background:transparent; color:var(--fg); border:1px solid var(--border)}
  .btn-outline:hover:not(:disabled){border-color:var(--primary); color:var(--primary); background:var(--primary-soft)}
  .btn-ghost{background:transparent; color:var(--muted); border:0}
  .btn-ghost:hover{color:var(--primary)}
  .btn-sm{padding:6px 12px; font-size:13px}

  .badge{display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; background:var(--primary-soft); color:var(--primary)}

  .alert{
    padding:12px 14px; border-radius:10px; font-size:13.5px; line-height:1.55;
    display:flex; gap:10px; align-items:flex-start;
    background:color-mix(in srgb,var(--warn) 10%,var(--card));
    border:1px solid color-mix(in srgb,var(--warn) 40%,var(--border));
    color:var(--fg);
  }
  .alert svg{width:18px;height:18px;color:var(--warn);flex-shrink:0;margin-top:1px}

  /* File list (merge) */
  .file-list{display:flex; flex-direction:column; gap:8px; margin-top:14px}
  .file-item{
    display:flex; align-items:center; gap:12px;
    background:var(--bg); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px;
  }
  .file-item .grip{color:var(--muted); cursor:grab; padding:4px}
  .file-item.drag{opacity:.4}
  .file-item .info{flex:1; min-width:0}
  .file-item .info .name{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .file-item .info .meta{font-size:12px; color:var(--muted)}
  .file-item .file-icon{width:36px;height:36px;border-radius:8px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .file-item .file-icon svg{width:16px;height:16px}

  /* Page thumbs grid */
  .thumbs{display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); padding:6px}
  .thumb{
    position:relative; background:#fff; border:2px solid transparent; border-radius:9px;
    overflow:hidden; cursor:pointer; transition:all .12s;
    display:flex; flex-direction:column; align-items:center;
  }
  .thumb canvas{display:block; max-width:100%; height:auto}
  .thumb .pn{position:absolute; bottom:6px; inset-inline-end:6px; background:rgba(0,0,0,.65); color:#fff; font-size:11px; font-weight:600; padding:2px 7px; border-radius:6px}
  .thumb.selected{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .thumb:hover{border-color:var(--primary)}
  .thumb-actions{
    position:absolute; top:6px; inset-inline-start:6px; display:flex; gap:4px;
    opacity:0; transition:opacity .12s;
  }
  .thumb:hover .thumb-actions{opacity:1}
  .thumb-actions button{
    width:26px;height:26px;border-radius:7px;border:0;
    background:rgba(255,255,255,.95); color:#222;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
  }
  .thumb-actions button:hover{background:var(--primary); color:#fff}
  .thumb-actions button svg{width:13px;height:13px}

  /* Viewer */
  .viewer-wrap{display:flex; gap:14px; height:calc(100vh - 240px); min-height:520px}
  .viewer-thumbs{
    width:160px; flex-shrink:0; background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:10px; overflow-y:auto;
  }
  .viewer-thumbs .thumb{margin-bottom:8px}
  .viewer-main{flex:1; display:flex; flex-direction:column; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden}
  .viewer-toolbar{
    display:flex; gap:6px; align-items:center; padding:8px 12px;
    border-bottom:1px solid var(--border); background:var(--card); flex-wrap:wrap;
  }
  .viewer-toolbar .sep{width:1px; height:22px; background:var(--border); margin:0 2px}
  .viewer-canvas-wrap{flex:1; overflow:auto; background:color-mix(in srgb,var(--bg) 50%,#000 4%); display:flex; justify-content:center; align-items:flex-start; padding:24px}
  .viewer-canvas-wrap canvas{background:#fff; box-shadow:0 12px 40px -10px rgba(0,0,0,.25); border-radius:4px}
  .page-input{
    background:var(--bg); border:1px solid var(--border); border-radius:7px;
    width:48px; height:32px; padding:0 6px; text-align:center; font-size:13px;
  }

  /* Sign / annotate canvas overlay */
  .doc-stage{position:relative; display:inline-block}
  .doc-stage canvas{display:block; background:#fff; box-shadow:0 8px 30px -8px rgba(0,0,0,.25); border-radius:4px}
  .placement{position:absolute; transform:translate(-50%,-50%); cursor:move; user-select:none; touch-action:none}
  .placement img{max-width:100%; display:block; pointer-events:none; filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}
  .placement.text{font-weight:600; color:#1e1b4b; background:rgba(255,255,255,.9); padding:3px 8px; border-radius:4px; white-space:nowrap; line-height:1.2}
  .placement.highlight{background:rgba(250,204,21,.45); border-radius:2px; transform:translate(0,-50%)}
  .placement.stamp{font-weight:800; padding:5px 14px; border:2.5px solid; border-radius:6px; text-transform:uppercase; letter-spacing:.05em; background:rgba(255,255,255,.6); white-space:nowrap}
  .placement.selected{outline:2px dashed #2563eb; outline-offset:2px; z-index:10}
  .placement .ph-handle{position:absolute; width:14px; height:14px; background:#2563eb; border:2px solid #fff; border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.3); pointer-events:auto; opacity:0; transition:opacity .15s}
  .placement.selected .ph-handle{opacity:1}
  .placement .ph-handle.br{right:-9px; bottom:-9px; cursor:nwse-resize}
  .placement .ph-handle.del{right:-9px; top:-9px; cursor:pointer; background:#dc2626; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:bold; line-height:1; width:18px; height:18px}
  .placement.text.editing{cursor:text}
  .placement.text input{font:inherit; color:inherit; background:transparent; border:none; outline:none; padding:0; margin:0; min-width:60px; width:auto}

  .signature-pad{
    background:#fff; border:1px solid var(--border); border-radius:9px; height:160px;
  }

  /* Result panel */
  .result{
    margin-top:18px; padding:18px; border-radius:12px;
    background:linear-gradient(135deg,var(--primary-soft),var(--card));
    border:1px solid color-mix(in srgb,var(--primary) 30%,var(--border));
  }
  .result-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px}
  .result-grid .stat-label{font-size:11px; text-transform:uppercase; color:var(--muted); letter-spacing:.05em; font-weight:700}
  .result-grid .stat-val{font-size:24px; font-weight:800; font-variant-numeric:tabular-nums}
  .result-grid .stat-val.hi{color:var(--primary)}

  /* Tabs */
  .tabs{display:flex; gap:4px; padding:4px; background:var(--bg); border-radius:9px; border:1px solid var(--border)}
  .tab{
    flex:1; background:transparent; border:0; padding:8px 10px; border-radius:6px;
    font-size:13px; font-weight:600; color:var(--muted);
  }
  .tab.active{background:var(--card); color:var(--fg); box-shadow:0 1px 3px rgba(0,0,0,.07)}

  /* Toast */
  .toast-wrap{
    position:fixed; bottom:24px; inset-inline-end:24px; z-index:200;
    display:flex; flex-direction:column; gap:8px; pointer-events:none;
  }
  .toast{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:11px 16px; box-shadow:var(--shadow); font-size:14px; font-weight:500;
    display:flex; align-items:center; gap:10px; min-width:240px;
    animation:slideIn .25s ease-out; pointer-events:auto;
  }
  @keyframes slideIn{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:translateY(0)}}
  .toast.success{border-color:color-mix(in srgb,var(--success) 50%,var(--border)); color:var(--success)}
  .toast.error{border-color:color-mix(in srgb,var(--danger) 50%,var(--border)); color:var(--danger)}

  /* Loading */
  .spinner{
    width:32px;height:32px;border-radius:50%;
    border:3px solid var(--border); border-top-color:var(--primary);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading{display:flex; align-items:center; justify-content:center; padding:40px; color:var(--muted)}

  /* Hidden */
  .hidden{display:none !important}

  /* Slider */
  input[type=range]{width:100%; accent-color:var(--primary)}

  /* Color input */
  input[type=color]{
    width:46px; height:38px; padding:0; border:1px solid var(--border); border-radius:8px;
    background:transparent; cursor:pointer;
  }

  /* Trust badges row */
  .badges{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px; margin:30px auto 0; max-width:960px;
  }
  .badge{
    display:flex; gap:12px; align-items:flex-start;
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px;
  }
  .badge .ico{
    width:36px;height:36px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--primary-soft); color:var(--primary);
  }
  .badge .ico svg{width:18px;height:18px}
  .badge h4{margin:0 0 2px; font-size:14px; font-weight:700; color:var(--fg)}
  .badge p{margin:0; font-size:12.5px; color:var(--muted); line-height:1.45}

  /* "How it works" steps */
  .how-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px; max-width:1000px; margin:0 auto;
  }
  .how-step{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:24px 22px; text-align:center; position:relative;
  }
  .how-step .num{
    width:42px;height:42px;border-radius:50%;
    background:var(--primary); color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-weight:800; font-size:18px; margin-bottom:14px;
  }
  .how-step h3{margin:0 0 8px; font-size:17px; font-weight:700; color:var(--fg)}
  .how-step p{margin:0; font-size:14px; color:var(--muted); line-height:1.55}

  /* FAQ accordion */
  .faq{max-width:780px; margin:0 auto}
  .faq-item{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    margin-bottom:10px; overflow:hidden;
  }
  .faq-q{
    width:100%; background:none; border:0; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:16px 18px; font-size:15px; font-weight:600; color:var(--fg); text-align:start;
  }
  .faq-q .chev{transition:transform .2s; flex-shrink:0; color:var(--muted)}
  .faq-q .chev svg{width:18px;height:18px}
  .faq-item.open .faq-q .chev{transform:rotate(180deg); color:var(--primary)}
  .faq-a{
    max-height:0; overflow:hidden; transition:max-height .25s ease;
    color:var(--muted); font-size:14px; line-height:1.6; padding:0 18px;
  }
  .faq-item.open .faq-a{max-height:300px; padding:0 18px 16px}

  /* Footer */
  footer{
    margin-top:80px; padding:36px 22px 24px;
    border-top:1px solid var(--border); background:var(--card);
    color:var(--muted); font-size:13px;
  }
  .footer-inner{
    max-width:1100px; margin:0 auto;
    display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:30px;
  }
  .footer-brand{display:flex; flex-direction:column; gap:10px}
  .footer-brand .b{display:flex; align-items:center; gap:10px; color:var(--fg); font-weight:800; font-size:16px}
  .footer-brand .b svg{width:22px;height:22px;color:var(--primary)}
  .footer-brand p{margin:0; line-height:1.55; max-width:340px}
  .footer-col h5{margin:0 0 12px; font-size:13px; font-weight:700; color:var(--fg); text-transform:uppercase; letter-spacing:.04em}
  .footer-col a{display:block; color:var(--muted); text-decoration:none; padding:5px 0; font-size:13.5px; cursor:pointer; background:none; border:0; text-align:start; font:inherit}
  .footer-col a:hover{color:var(--primary)}
  .footer-bottom{
    max-width:1100px; margin:24px auto 0; padding-top:16px;
    border-top:1px solid var(--border); text-align:center; font-size:12.5px;
  }
  @media (max-width:720px){
    .footer-inner{grid-template-columns:1fr; gap:24px}
  }

  /* Responsive */
  @media (max-width:720px){
    .nav{display:none}
    .viewer-wrap{flex-direction:column; height:auto}
    .viewer-thumbs{width:100%; max-height:120px; display:flex; gap:8px; overflow-x:auto; overflow-y:hidden}
    .viewer-thumbs .thumb{margin:0; flex-shrink:0; width:80px}
    .result-grid{grid-template-columns:1fr}
  }

  /* RTL specific tweaks */

function tt(key){
  const parts = key.split('.');
  let v = I18N[LANG];

}

function fmtBytes(b){
  if (!b) return '0 B';
  const k=1024, units=['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b)/Math.log(k));
  return (b/Math.pow(k,i)).toFixed(1).replace(/\.0$/,'') + ' ' + units[i];
}

// Web Worker Helper for background processing
function runInWorker(fn, args) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([`
      onmessage = async function(e) {
        try {
          const result = await (${fn.toString()})(...e.data);
          postMessage({ success: true, result });
        } catch (err) {
          postMessage({ success: false, error: err.message });
        }
      }
    `], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = e => {
      if (e.data.success) resolve(e.data.result);
      else reject(new Error(e.data.error));
      worker.terminate();
    };
    worker.onerror = err => { reject(err); worker.terminate(); };
    worker.postMessage(args);
  });
}

// Global Drag & Drop for Tools
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  if (e.target.closest('.dropzone')) return;
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  if (files.length > 0) {
    const file = files[0];
    if (file.type === 'application/pdf') {
      if (window.location.hash === '' || window.location.hash === '#home') {
        nav('viewer');
        setTimeout(() => {
          const dz = document.querySelector('.dropzone input');
          if (dz) {
            const dt = new DataTransfer();
            dt.items.add(file);
            dz.files = dt.files;
            dz.dispatchEvent(new Event('change', { bubbles: true }));
          }
        }, 100);
      }
    }
  }
});

function dropzone(opts){
  const { multi=false, accept='application/pdf', label, onFiles } = opts;
  const id = 'dz_'+Math.random().toString(36).slice(2,8);
  setTimeout(()=>{
    const el = document.getElementById(id);
    if (!el) return;
    const input = el.querySelector('input');
    el.addEventListener('click', e => { if (e.target.tagName !== 'INPUT') input.click(); });
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag');
      const files = [...e.dataTransfer.files].filter(f => acceptCheck(f, accept));
      if (files.length) onFiles(multi ? files : [files[0]]);
    });
    input.addEventListener('change', e => {
      const files = [...e.target.files];
      if (files.length) onFiles(multi ? files : [files[0]]);
      input.value = '';
    });
  }, 0);
  return `<div id="${id}" class="dropzone" style="margin:0;padding:36px 18px">
    <input type="file" ${multi?'multiple':''} accept="${accept}" style="display:none"/>
    <div class="dropzone-icon">${svg('upload')}</div>
    <p class="lead">${label || tt('actions.browse')}</p>
    <p class="sub">${accept.replace('application/','').replace(/,/g,' · ')}</p>
  </div>`;
}
function acceptCheck(file, accept){
  if (accept === 'application/pdf') return file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
  if (accept.includes('image')) return /^image\//.test(file.type);
  return true;
}

window.nav = (route, state=null) => {
  currentRoute = route;
  routeState = state;
  location.hash = '#/' + route;
  render();
  window.scrollTo({top:0, behavior:'instant'});
};
window.addEventListener('hashchange', () => {
  const r = (location.hash.replace(/^#\//,'') || 'home');
  if (ROUTES[r] && r !== currentRoute){ currentRoute = r; routeState = null; render(); }
});
function render(){
  if (location.hash.replace(/^#\//,'') !== currentRoute){
    const r = (location.hash.replace(/^#\//,'') || 'home');
    if (ROUTES[r]) currentRoute = r;
  }
  applyLang();
  document.querySelectorAll('.nav-btn').forEach(b => {
    const c = b.dataset.cat;
    b.classList.toggle('active', (currentRoute === 'home' && c === 'home') || (currentRoute === 'about' && c === 'about'));
  });
  const main = document.getElementById('main');
  main.innerHTML = '';
  (ROUTES[currentRoute] || renderHome)(main);
  renderFooter();
  applyLang();
}

/* ================== VIEWER ================== */
async function renderViewer(main){
  main.innerHTML = `<div class="tool-page" style="max-width:1100px">${toolHead('viewer')}<div id="vc"></div></div>`;
  const vc = document.getElementById('vc');
  let file = window.__viewerFile || null;
  if (!file){
    vc.innerHTML = dropzone({onFiles: f => { file = f[0]; window.__viewerFile = file; renderViewer(main); }});
    return;
  }
  vc.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  let pdf;
  try { pdf = await loadPdfJs(await file.arrayBuffer()); }
  catch { toast(tt('errors.invalid'),'error'); window.__viewerFile=null; return renderViewer(main); }

  let page = 1, scale = 1.2;
  vc.innerHTML = `
    <div class="viewer-wrap">
      <div class="viewer-thumbs" id="vthumbs"></div>
      <div class="viewer-main">
        <div class="viewer-toolbar">
          <button class="icon-btn" id="vPrev">${svg('chevL','class="rotate-rtl"')}</button>
          <input class="page-input" id="vPage" value="1"/>
          <span style="color:var(--muted);font-size:13px">/ ${pdf.numPages}</span>
          <button class="icon-btn" id="vNext">${svg('chevR','class="rotate-rtl"')}</button>
          <div class="sep"></div>
          <button class="icon-btn" id="vZoomOut">${svg('zoomOut')}</button>
          <span id="vZoomLabel" style="font-size:13px;width:48px;text-align:center;color:var(--muted)">120%</span>
          <button class="icon-btn" id="vZoomIn">${svg('zoomIn')}</button>
          <button class="icon-btn" id="vFit" title="Fit width">${svg('fit')}</button>
          <div style="margin-inline-start:auto;display:flex;gap:8px">
            <button class="btn btn-outline btn-sm" onclick="window.__viewerFile=null;nav('viewer')">${tt('actions.clear')}</button>
            <button class="btn btn-sm" id="vDl">${svg('download')} ${tt('actions.download')}</button>
          </div>
        </div>
        <div class="viewer-canvas-wrap"><canvas id="vCanvas"></canvas></div>
      </div>
    </div>`;

  const canvas = document.getElementById('vCanvas');
  const ctx = canvas.getContext('2d');

  async function renderPage(){
    const p = await pdf.getPage(page);
    const vp = p.getViewport({scale});
    const dpr = devicePixelRatio||1;
    canvas.width = vp.width*dpr; canvas.height = vp.height*dpr;
    canvas.style.width = vp.width+'px'; canvas.style.height = vp.height+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    await p.render({canvasContext:ctx, viewport:vp, canvas}).promise;
    document.getElementById('vPage').value = page;
    document.getElementById('vZoomLabel').textContent = Math.round(scale*100)+'%';
  }
  function update(){ renderPage(); document.querySelectorAll('#vthumbs .thumb').forEach((t,i)=>t.classList.toggle('selected', i+1===page)); }

  document.getElementById('vPrev').onclick = () => { if (page>1){page--; update();} };
  document.getElementById('vNext').onclick = () => { if (page<pdf.numPages){page++; update();} };
  document.getElementById('vPage').onchange = e => { const n=parseInt(e.target.value); if (n>=1&&n<=pdf.numPages){page=n;update();} };
  document.getElementById('vZoomIn').onclick = () => { scale=Math.min(4,scale+0.2); renderPage(); };
  document.getElementById('vZoomOut').onclick = () => { scale=Math.max(0.4,scale-0.2); renderPage(); };
  document.getElementById('vFit').onclick = async () => {
    const p = await pdf.getPage(page); const vp = p.getViewport({scale:1});
    const w = document.querySelector('.viewer-canvas-wrap').clientWidth - 48;
    scale = Math.max(0.4, w/vp.width); renderPage();
  };
  document.getElementById('vDl').onclick = () => downloadBlob(file, file.name);

  // thumbnails
  const tw = document.getElementById('vthumbs');
  for (let i=1; i<=pdf.numPages; i++){
    const wrap = document.createElement('div');
    wrap.className = 'thumb' + (i===page?' selected':'');
    wrap.innerHTML = `<canvas></canvas><span class="pn">${i}</span>`;
    wrap.onclick = () => { page=i; update(); };
    tw.appendChild(wrap);
    renderThumb(pdf, i, wrap.querySelector('canvas'), 130);
  }
  await renderPage();
}

async function renderThumb(pdf, pageNum, canvas, width=130, rotation=0){
  const p = await pdf.getPage(pageNum);
  const base = p.getViewport({scale:1, rotation});
  const s = width / base.width;
  const vp = p.getViewport({scale:s, rotation});
  const dpr = devicePixelRatio||1;
  canvas.width = vp.width*dpr; canvas.height = vp.height*dpr;
  canvas.style.width = vp.width+'px'; canvas.style.height = vp.height+'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  await p.render({canvasContext:ctx, viewport:vp, canvas}).promise;
}

/* ================== MERGE ================== */
function renderMerge(main){
  main.innerHTML = `<div class="tool-page">${toolHead('merge')}<div class="card" id="mcard"></div></div>`;
  const card = document.getElementById('mcard');
  let items = [];
  let outName = 'merged.pdf';

  function paint(){
    card.innerHTML = `
      ${dropzone({multi:true, label: tt('actions.browseMulti'), onFiles: async fs => {
        for (const f of fs){
          let pages;
          try { const d = await PDFDocument.load(await f.arrayBuffer(),{ignoreEncryption:true}); pages = d.getPageCount(); } catch {}
          items.push({id:'i'+Math.random().toString(36).slice(2), file:f, pages});
        }
        paint();
      }})}
      ${items.length ? `
        <div class="file-list" id="mlist">
          ${items.map((it, i) => `
            <div class="file-item" draggable="true" data-i="${i}" data-id="${it.id}">
              <span class="grip">${svg('grip')}</span>
              <div class="file-icon">${svg('file')}</div>
              <div class="info">
                <div class="name">${it.file.name}</div>
                <div class="meta">${fmtBytes(it.file.size)}${it.pages?` · ${it.pages} pages`:''}</div>
              </div>
              <button class="icon-btn" onclick="window.__merge_remove('${it.id}')">${svg('x')}</button>
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:10px;margin-top:18px;align-items:flex-end;flex-wrap:wrap">
          <div class="field" style="flex:1;min-width:200px;margin:0">
            <label>${tt('merge.output')}</label>
            <input class="input" id="moutput" value="${outName}"/>
          </div>
          <button class="btn" id="mdo">${svg('arrowDown')} ${tt('merge.action')}</button>
        </div>
      ` : ''}
    `;
    if (items.length){
      document.getElementById('moutput').oninput = e => outName = e.target.value;
      document.getElementById('mdo').onclick = doMerge;
      enableDrag();
    }
  }
  window.__merge_remove = id => { items = items.filter(i=>i.id!==id); paint(); };
  function enableDrag(){
    const list = document.getElementById('mlist');
    let dragId = null;
    list.querySelectorAll('.file-item').forEach(el => {
      el.addEventListener('dragstart', e => { dragId = el.dataset.id; el.classList.add('drag'); });
      el.addEventListener('dragend', () => { el.classList.remove('drag'); dragId = null; });
      el.addEventListener('dragover', e => e.preventDefault());
      el.addEventListener('drop', e => {
        e.preventDefault();
        if (!dragId || dragId === el.dataset.id) return;
        const from = items.findIndex(i=>i.id===dragId);
        const to = items.findIndex(i=>i.id===el.dataset.id);
        const [m] = items.splice(from,1); items.splice(to,0,m); paint();
      });
    });
  }
  async function doMerge(){
    if (items.length < 2){ toast(tt('merge.needTwo'),'error'); return; }
    const btn = document.getElementById('mdo'); btn.disabled = true; btn.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> ${tt('actions.processing')}`;
    try {
      const out = await PDFDocument.create();
      for (const it of items){
        const src = await PDFDocument.load(await it.file.arrayBuffer(),{ignoreEncryption:true});
        const pp = await out.copyPages(src, src.getPageIndices());
        pp.forEach(p=>out.addPage(p));
      }
      const bytes = await out.save();
      downloadBytes(bytes, outName.endsWith('.pdf')?outName:outName+'.pdf');
      toast(tt('actions.done'));
    } catch (e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; paint(); }
  }
  paint();
}

/* ================== SPLIT ================== */
async function renderSplit(main){
  main.innerHTML = `<div class="tool-page" style="max-width:1100px">${toolHead('split')}<div id="scard"></div></div>`;
  const card = document.getElementById('scard');
  let file = null, pdf = null, mode = 'ranges', ranges = '', chunk = 1;

  async function paint(){
    if (!file){
      card.innerHTML = `<div class="card">${dropzone({onFiles: async fs => { file = fs[0]; pdf = await loadPdfJs(await file.arrayBuffer()); ranges = `1-${pdf.numPages}`; paint(); }})}</div>`;
      return;
    }
    card.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 320px;gap:16px" id="splitGrid">
        <div class="card" style="padding:14px"><div class="thumbs" id="sthumbs"></div></div>
        <div class="card">
          <div style="margin-bottom:14px">
            <div style="font-weight:600">${file.name}</div>
            <div style="color:var(--muted);font-size:13px">${pdf.numPages} pages · ${fmtBytes(file.size)}</div>
          </div>
          <div class="tabs" style="margin-bottom:14px">
            <button class="tab ${mode==='ranges'?'active':''}" data-m="ranges">${tt('split.modeRanges')}</button>
            <button class="tab ${mode==='every'?'active':''}" data-m="every">${tt('split.modeEvery')}</button>
            <button class="tab ${mode==='chunks'?'active':''}" data-m="chunks">${tt('split.modeChunks')}</button>
          </div>
          <div id="splitOpts"></div>
          <div style="display:flex;gap:8px;margin-top:18px">
            <button class="btn btn-outline" style="flex:1" onclick="window.__split_clear()">${tt('actions.clear')}</button>
            <button class="btn" style="flex:1" id="sdo">${svg('arrowDown')} ${tt('split.action')}</button>
          </div>
        </div>
      </div>
    `;
    if (innerWidth < 900) document.getElementById('splitGrid').style.gridTemplateColumns='1fr';
    paintOpts();
    document.querySelectorAll('[data-m]').forEach(b => b.onclick = () => { mode = b.dataset.m; paint(); });
    document.getElementById('sdo').onclick = doSplit;
    const tw = document.getElementById('sthumbs');
    for (let i=1;i<=pdf.numPages;i++){
      const t = document.createElement('div'); t.className='thumb';
      t.innerHTML = `<canvas></canvas><span class="pn">${i}</span>`;
      tw.appendChild(t);
      renderThumb(pdf, i, t.querySelector('canvas'), 120);
    }
  }
  function paintOpts(){
    const opts = document.getElementById('splitOpts');
    if (mode === 'ranges')
      opts.innerHTML = `<div class="field"><label>${tt('split.ranges')}</label><input class="input" id="srng" value="${ranges}"/></div>`,
      document.getElementById('srng').oninput = e => ranges = e.target.value;
    else if (mode === 'chunks')
      opts.innerHTML = `<div class="field"><label>${tt('split.chunkSize')}</label><input class="input" type="number" min="1" id="schk" value="${chunk}"/></div>`,
      document.getElementById('schk').oninput = e => chunk = parseInt(e.target.value)||1;
    else opts.innerHTML = `<p style="color:var(--muted);font-size:13px;margin:8px 0">${tt('split.modeEvery')}</p>`;
  }
  window.__split_clear = () => { file=null; pdf=null; paint(); };
  function parseRng(input, max){
    const out = [];
    for (const g of input.split(',').map(s=>s.trim()).filter(Boolean)){
      if (g.includes('-')){
        const [a,b] = g.split('-').map(n=>parseInt(n));
        if (isNaN(a)||isNaN(b)||a<1||b<a||b>max) throw 0;
        const arr=[]; for (let i=a;i<=b;i++) arr.push(i); out.push(arr);
      } else { const n=parseInt(g); if (isNaN(n)||n<1||n>max) throw 0; out.push([n]); }
    }
    return out;
  }
  async function doSplit(){
    let groups;
    if (mode === 'ranges'){ try { groups = parseRng(ranges, pdf.numPages); } catch { toast(tt('split.invalid'),'error'); return; } }
    else if (mode === 'every') groups = Array.from({length:pdf.numPages},(_,i)=>[i+1]);
    else { groups=[]; for (let i=1;i<=pdf.numPages;i+=chunk){ const g=[]; for (let j=i;j<Math.min(i+chunk,pdf.numPages+1);j++) g.push(j); groups.push(g);} }
    const btn = document.getElementById('sdo'); btn.disabled = true;
    try {
      const src = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      const base = file.name.replace(/\.pdf$/i,'');
      if (groups.length === 1){
        const out = await PDFDocument.create();
        const pp = await out.copyPages(src, groups[0].map(p=>p-1));
        pp.forEach(p=>out.addPage(p));
        downloadBytes(await out.save(), deriveName(file.name,'split'));
      } else {
        const zip = new JSZip();
        for (const g of groups){
          const out = await PDFDocument.create();
          const pp = await out.copyPages(src, g.map(p=>p-1));
          pp.forEach(p=>out.addPage(p));
          const label = g.length===1?`page-${g[0]}`:`pages-${g[0]}-${g[g.length-1]}`;
          zip.file(`${base}-${label}.pdf`, await out.save());
        }
        const blob = await zip.generateAsync({type:'blob'});
        downloadBlob(blob, base+'-split.zip');
      }
      toast(tt('actions.done'));
    } catch (e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }
  paint();
}

    if (result) document.getElementById('cdl').onclick = () => downloadBlob(result.blob, deriveName(file.name,'compressed'));
  }
  window.__cmp_clr = () => { file=null; result=null; paint(); };
  async function doIt(){
    const btn = document.getElementById('cdo'); btn.disabled = true;
    try {
      const doc = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      const tick = quality==='low'?50:quality==='medium'?100:200;
      const bytes = await doc.save({useObjectStreams:true, objectsPerTick:tick});
      const blob = new Blob([bytes],{type:'application/pdf'});
      result = {before:file.size, after:blob.size, blob};
      paint();
      toast(tt('actions.done'));
    } catch (e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }
  paint();
}

async function renderOrganize(main){

    if (!file){ card.innerHTML = `<div class="card">${dropzone({onFiles: async fs => { file=fs[0]; pdf=await loadPdfJs(await file.arrayBuffer()); items = Array.from({length:pdf.numPages},(_,i)=>({id:'p'+i, idx:i, rot:0})); paint(); }})}</div>`; return; }

        </div>

      </div>`;

    items.forEach((it, i) => {

      t.className = 'thumb';
      t.draggable = true;
      t.dataset.id = it.id;
      t.innerHTML = `<canvas></canvas>
        <div class="thumb-actions">

          <button title="delete" data-act="del">${svg('trash')}</button>
        </div>
        <span class="pn">${i+1}</span>`;
      tw.appendChild(t);
      renderThumb(pdf, it.idx+1, t.querySelector('canvas'), 130, it.rot);
      t.querySelector('[data-act=rot]').onclick = e => { e.stopPropagation(); it.rot = (it.rot+90)%360; renderThumb(pdf, it.idx+1, t.querySelector('canvas'), 130, it.rot); };
      t.querySelector('[data-act=del]').onclick = e => { e.stopPropagation(); items = items.filter(x=>x.id!==it.id); paint(); };
    });
    enableDragOrg();
  }
  function enableDragOrg(){
    let dragId = null;
    document.querySelectorAll('#othumbs .thumb').forEach(el => {
      el.addEventListener('dragstart', () => { dragId = el.dataset.id; el.classList.add('drag'); });
      el.addEventListener('dragend', () => el.classList.remove('drag'));
      el.addEventListener('dragover', e => e.preventDefault());
      el.addEventListener('drop', e => {
        e.preventDefault();
        if (!dragId || dragId===el.dataset.id) return;
        const from = items.findIndex(i=>i.id===dragId);
        const to = items.findIndex(i=>i.id===el.dataset.id);
        const [m] = items.splice(from,1); items.splice(to,0,m); paint();
      });
    });
  }
  window.__org_clr = () => { file=null; pdf=null; items=[]; paint(); };
  async function doSave(){
    if (!items.length){ toast(tt('organize.noPages'),'error'); return; }
    const btn = document.getElementById('osave'); btn.disabled = true;
    try {
      const src = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      const out = await PDFDocument.create();
      const cps = await out.copyPages(src, items.map(i=>i.idx));
      cps.forEach((p, i) => { const r = p.getRotation().angle; p.setRotation(degrees((r+items[i].rot)%360)); out.addPage(p); });
      downloadBytes(await out.save(), deriveName(file.name,'organized'));
      toast(tt('actions.done'));
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }
  paint();
}

async function renderRotate(main){

  const card = document.getElementById('rcard');
  let file=null, pdf=null, rots={}, sel=new Set();

  async function paint(){
    if (!file){ card.innerHTML = `<div class="card">${dropzone({onFiles: async fs => { file=fs[0]; pdf=await loadPdfJs(await file.arrayBuffer()); rots={}; sel=new Set(); paint(); }})}</div>`; return; }

        <div><div style="font-weight:600">${file.name}</div><div style="color:var(--muted);font-size:13px">${sel.size?sel.size+' '+tt('rotate.selected'):tt('rotate.all')}</div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" id="rselA">${tt('rotate.all')}</button>
          <button class="btn btn-outline btn-sm" id="rclr">${tt('actions.clear')}</button>
          <button class="btn btn-outline btn-sm" id="rL">↺ -90°</button>
          <button class="btn btn-outline btn-sm" id="rR">↻ +90°</button>
          <button class="btn btn-outline btn-sm" id="r180">180°</button>
          <button class="btn btn-sm" id="rdo">${svg('arrowDown')} ${tt('rotate.action')}</button>
        </div>
      </div>
      <div class="thumbs" id="rthumbs"></div>
    </div>`;
    const tw = document.getElementById('rthumbs');
    for (let i=0; i<pdf.numPages; i++){
      const t = document.createElement('div');
      t.className = 'thumb' + (sel.has(i)?' selected':'');
      t.innerHTML = `<canvas></canvas><span class="pn">${i+1}</span>`;
      t.onclick = () => { if (sel.has(i)) sel.delete(i); else sel.add(i); paint(); };
      tw.appendChild(t);
      renderThumb(pdf, i+1, t.querySelector('canvas'), 130, rots[i]||0);
    }
    document.getElementById('rselA').onclick = () => { sel = new Set(Array.from({length:pdf.numPages},(_,i)=>i)); paint(); };
    document.getElementById('rclr').onclick = () => { sel = new Set(); paint(); };
    document.getElementById('rL').onclick = () => doRot(-90);
    document.getElementById('rR').onclick = () => doRot(90);
    document.getElementById('r180').onclick = () => doRot(180);
    document.getElementById('rdo').onclick = doSave;
  }
  function doRot(d){
    const tgts = sel.size ? [...sel] : Array.from({length:pdf.numPages},(_,i)=>i);
    tgts.forEach(i => rots[i] = ((rots[i]||0) + d + 360) % 360);
    paint();
  }
  async function doSave(){
    const btn = document.getElementById('rdo'); btn.disabled = true;
    try {
      const doc = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      doc.getPages().forEach((p, i) => { const add = rots[i]||0; if (add){ const r = p.getRotation().angle; p.setRotation(degrees((r+add)%360)); }});
      downloadBytes(await doc.save(), deriveName(file.name,'rotated'));
      toast(tt('actions.done'));
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }
  paint();
}

/* ================== WATERMARK ================== */
function renderWatermark(main){
  main.innerHTML = `<div class="tool-page">${toolHead('watermark')}<div class="card" id="wcard"></div></div>`;
  const card = document.getElementById('wcard');
  let file=null, text='CONFIDENTIAL', size=60, opacity=0.25, angle=-30, color='#5b4bff', position='center', spacing=120;

  function paint(){
    if (!file){ card.innerHTML = dropzone({onFiles:fs=>{file=fs[0]; paint();}}); return; }
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-weight:600">${file.name}</div><button class="btn btn-outline btn-sm" onclick="window.__wm_clr()">${tt('actions.clear')}</button></div>
      <div class="field"><label>${tt('watermark.text')}</label><input class="input" id="wtxt" value="${text}"/></div>
      <div class="row">
        <div class="field"><label>${tt('watermark.position')}</label>
          <select class="select" id="wpos">
            ${['center','tile','topLeft','topRight','bottomLeft','bottomRight'].map(p=>`<option value="${p}" ${p===position?'selected':''}>${tt('watermark.'+p)}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>${tt('watermark.color')}</label><div style="display:flex;gap:6px"><input type="color" id="wcol" value="${color}"/><input class="input" id="wcolt" value="${color}"/></div></div>
      </div>
      <div class="field"><label>${tt('watermark.size')} <span style="color:var(--muted);font-weight:400" id="wszL">${size}px</span></label><input type="range" min="${position==='tile'?14:20}" max="${position==='tile'?80:200}" step="2" value="${size}" id="wsz"/></div>
      <div class="field"><label>${tt('watermark.opacity')} <span style="color:var(--muted);font-weight:400" id="wopL">${Math.round(opacity*100)}%</span></label><input type="range" min="5" max="100" step="5" value="${opacity*100}" id="wop"/></div>
      ${(position==='center'||position==='tile')?`<div class="field"><label>${tt('watermark.angle')} <span style="color:var(--muted);font-weight:400" id="wagL">${angle}°</span></label><input type="range" min="-90" max="90" step="5" value="${angle}" id="wag"/></div>`:''}
      ${position==='tile'?`<div class="field"><label>${tt('watermark.spacing')} <span style="color:var(--muted);font-weight:400" id="wspL">${spacing}px</span></label><input type="range" min="40" max="280" step="10" value="${spacing}" id="wsp"/></div>`:''}
      <button class="btn btn-block" id="wdo">${svg('watermark')} ${tt('watermark.action')}</button>
    `;
    document.getElementById('wtxt').oninput = e => text = e.target.value;
    document.getElementById('wpos').onchange = e => { position = e.target.value; if (position==='tile' && size>80) size=42; paint(); };
    document.getElementById('wcol').oninput = e => { color = e.target.value; document.getElementById('wcolt').value = color; };
    document.getElementById('wcolt').oninput = e => { color = e.target.value; document.getElementById('wcol').value = color; };
    document.getElementById('wsz').oninput = e => { size=+e.target.value; document.getElementById('wszL').textContent = size+'px'; };
    document.getElementById('wop').oninput = e => { opacity=+e.target.value/100; document.getElementById('wopL').textContent = Math.round(opacity*100)+'%'; };
    if (position==='center'||position==='tile') document.getElementById('wag').oninput = e => { angle=+e.target.value; document.getElementById('wagL').textContent = angle+'°'; };
    if (position==='tile') document.getElementById('wsp').oninput = e => { spacing=+e.target.value; document.getElementById('wspL').textContent = spacing+'px'; };
    document.getElementById('wdo').onclick = doIt;
  }
  window.__wm_clr = () => { file=null; paint(); };
  function hex(c){ const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(c); if (!m) return [0,0,0]; return [parseInt(m[1],16)/255,parseInt(m[2],16)/255,parseInt(m[3],16)/255]; }
  async function doIt(){
    if (!text.trim()) return;
    const btn = document.getElementById('wdo'); btn.disabled = true;
    try {
      const doc = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      const font = await doc.embedFont(StandardFonts.HelveticaBold);
      const [r,g,b] = hex(color);
      doc.getPages().forEach(page => {
        const {width, height} = page.getSize();
        const tw = font.widthOfTextAtSize(text, size);
        if (position === 'tile'){
          // Tile/repeat across the whole page in a clean grid pattern
          const stepX = tw + spacing;
          const stepY = size + spacing;
          // Cover the whole page including a margin so rotated text reaches edges
          const margin = Math.max(stepX, stepY);
          for (let py = -margin; py < height + margin; py += stepY){
            // Offset every other row by half a step for a nicer pattern
            const rowOffset = (Math.round(py / stepY) % 2 === 0) ? 0 : stepX/2;
            for (let px = -margin + rowOffset; px < width + margin; px += stepX){
              page.drawText(text, {x:px, y:py, size, font, color:rgb(r,g,b), opacity, rotate: degrees(angle)});
            }
          }
        } else {
          let x, y;
          switch(position){
            case 'topLeft': x=40; y=height-size-40; break;
            case 'topRight': x=width-tw-40; y=height-size-40; break;
            case 'bottomLeft': x=40; y=40; break;
            case 'bottomRight': x=width-tw-40; y=40; break;
            default: x=(width-tw)/2; y=(height-size)/2;
          }
          page.drawText(text, {x, y, size, font, color:rgb(r,g,b), opacity, rotate: position==='center'?degrees(angle):degrees(0)});
        }
      });
      downloadBytes(await doc.save(), deriveName(file.name,'watermarked'));
      toast(tt('actions.done'));
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }
  paint();
}

          <div class="card">

    document.getElementById('sgStage').onclick = e => {
      if (!sigUrl) return;

      placements.push({page, x:(e.clientX-r.left)/r.width, y:(e.clientY-r.top)/r.height, w:0.25});
      drawPage();
    };
    drawPage();
  }
  function paintPicker(){
    const p = document.getElementById('sgPicker');
    if (mode === 'draw'){
      p.innerHTML = `<canvas class="signature-pad" id="sgPad"></canvas>
        <div style="display:flex;gap:6px;margin-top:8px"><button class="btn btn-outline btn-sm" id="sgClr">${tt('sign.clearSig')}</button><button class="btn btn-sm" id="sgUse">${tt('sign.apply')}</button></div>`;

      c.width = c.offsetWidth; c.height = c.offsetHeight;
      pad = new SignaturePad(c, {penColor:'#1e1b4b', backgroundColor:'rgba(255,255,255,0)'});
      document.getElementById('sgClr').onclick = () => pad.clear();
      document.getElementById('sgUse').onclick = () => { if (!pad.isEmpty()){ sigUrl = pad.toDataURL('image/png'); paint(); } };

      document.getElementById('sgName').oninput = e => typedName = e.target.value;
      document.getElementById('sgUse').onclick = () => {

      }});
    }
  }
  async function drawPage(){
    if (!pdf) return;
    const p = await pdf.getPage(page);
    const vp = p.getViewport({scale:1.2});
    const c = document.getElementById('sgCanvas');
    const dpr = devicePixelRatio||1;
    c.width = vp.width*dpr; c.height = vp.height*dpr;
    c.style.width=vp.width+'px'; c.style.height=vp.height+'px';
    const ctx = c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    await p.render({canvasContext:ctx, viewport:vp, canvas:c}).promise;
    const stage = document.getElementById('sgStage');
    stage.querySelectorAll('.placement').forEach(e=>e.remove());
    placements.filter(pl => pl.page===page).forEach((pl,idx) => {
      pl.id = pl.id || ('s'+idx+Math.random().toString(36).slice(2));
      const d = document.createElement('div');
      d.className = 'placement';
      d.style.left = (pl.x*100)+'%'; d.style.top = (pl.y*100)+'%';
      d.style.width = (pl.w*100)+'%';
      d.innerHTML = `<img src="${sigUrl}"/>`;
      stage.appendChild(d);
      // Custom interactive: drag + resize via width
      const onDown = e => {
        if (e.target.classList.contains('ph-handle')) return;
        stage.querySelectorAll('.placement.selected').forEach(p=>p.classList.remove('selected'));
        d.classList.add('selected');
        const t = e.touches ? e.touches[0] : e;
        const sx=t.clientX, sy=t.clientY, ox=pl.x, oy=pl.y;
        let moving = true;
        const mv = ev => {
          if (!moving) return;
          const tt2 = ev.touches ? ev.touches[0] : ev;
          const r = stage.getBoundingClientRect();
          pl.x = Math.max(0, Math.min(1, ox + (tt2.clientX-sx)/r.width));
          pl.y = Math.max(0, Math.min(1, oy + (tt2.clientY-sy)/r.height));
          d.style.left=(pl.x*100)+'%'; d.style.top=(pl.y*100)+'%';
        };
        const up = () => { moving=false; document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); document.removeEventListener('touchmove',mv); document.removeEventListener('touchend',up); };
        document.addEventListener('mousemove', mv);
        document.addEventListener('mouseup', up);
        document.addEventListener('touchmove', mv, {passive:false});
        document.addEventListener('touchend', up);
        e.stopPropagation(); e.preventDefault();
      };
      d.addEventListener('mousedown', onDown);
      d.addEventListener('touchstart', onDown, {passive:false});
      // Resize handle
      const hr = document.createElement('div'); hr.className='ph-handle br';
      d.appendChild(hr);
      const startR = e => {
        const t = e.touches ? e.touches[0] : e;
        const sx=t.clientX, w0=pl.w; let resizing=true;
        const mv = ev => {
          if (!resizing) return;
          const tt2 = ev.touches ? ev.touches[0] : ev;
          const r = stage.getBoundingClientRect();
          pl.w = Math.max(0.05, Math.min(0.9, w0 + (tt2.clientX-sx)/r.width));
          d.style.width=(pl.w*100)+'%';
        };
        const up = () => { resizing=false; document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); document.removeEventListener('touchmove',mv); document.removeEventListener('touchend',up); };
        document.addEventListener('mousemove', mv);
        document.addEventListener('mouseup', up);
        document.addEventListener('touchmove', mv, {passive:false});
        document.addEventListener('touchend', up);
        e.stopPropagation(); e.preventDefault();
      };
      hr.addEventListener('mousedown', startR);
      hr.addEventListener('touchstart', startR, {passive:false});
      // Delete handle
      const hd = document.createElement('div'); hd.className='ph-handle del'; hd.textContent='×';
      hd.addEventListener('mousedown', e => e.stopPropagation());
      hd.addEventListener('click', e => { e.stopPropagation(); placements = placements.filter(x => x.id !== pl.id); drawPage(); });
      d.appendChild(hd);
    });
  }
  window.__sg_clr = () => { file=null; pdf=null; sigUrl=null; placements=[]; paint(); };
  async function doSave(){
    if (!sigUrl){ toast(tt('sign.noSig'),'error'); return; }
    if (!placements.length){ toast(tt('sign.placeHint'),'error'); return; }
    const btn = document.getElementById('sgSave'); btn.disabled = true;
    try {
      const doc = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      const sigBytes = await fetch(sigUrl).then(r=>r.arrayBuffer());
      const img = await doc.embedPng(sigBytes);
      const ar = img.height / img.width;
      const pages = doc.getPages();
      placements.forEach(pl => {
        const pg = pages[pl.page-1]; if (!pg) return;
        const {width, height} = pg.getSize();
        const w = width*pl.w; const h = w*ar;
        const x = width*pl.x - w/2; const y = height - height*pl.y - h/2;
        pg.drawImage(img, {x, y, width:w, height:h});
      });
      downloadBytes(await doc.save(), deriveName(file.name,'signed'));
      toast(tt('actions.done'));
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }
  paint();
}

/* ================== ANNOTATE ================== */
/* Shared interactive helper: makes a placement element draggable, resizable,
   and (for text) editable. Updates the underlying ann object in place. */
function makeInteractive(el, ann, opts){
  const stage = opts.stage;
  const onChange = opts.onChange || (()=>{});
  const onDelete = opts.onDelete || (()=>{});
  const minPx = opts.minPx || 24;

  // Selection
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('ph-handle')) return;
    stage.querySelectorAll('.placement.selected').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');
    e.stopPropagation();
  });

  // Drag move
  let dragging = false, sx=0, sy=0, ox=0, oy=0;
  const onPointerDown = e => {
    if (e.target.classList.contains('ph-handle')) return;
    if (el.classList.contains('text') && el.classList.contains('editing')) return;
    dragging = true;
    const t = e.touches ? e.touches[0] : e;
    sx = t.clientX; sy = t.clientY;
    ox = ann.x; oy = ann.y;
    e.preventDefault();
  };
  const onPointerMove = e => {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const r = stage.getBoundingClientRect();
    const dx = (t.clientX - sx) / r.width;
    const dy = (t.clientY - sy) / r.height;
    ann.x = Math.max(0, Math.min(1, ox + dx));
    ann.y = Math.max(0, Math.min(1, oy + dy));
    el.style.left = (ann.x*100)+'%';
    el.style.top  = (ann.y*100)+'%';
  };
  const onPointerUp = () => { if (dragging){ dragging=false; onChange(); } };
  el.addEventListener('mousedown', onPointerDown);
  el.addEventListener('touchstart', onPointerDown, {passive:false});
  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('touchmove', onPointerMove, {passive:false});
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchend', onPointerUp);

  // Resize handle (bottom-right)
  const hr = document.createElement('div'); hr.className='ph-handle br';
  el.appendChild(hr);
  let resizing=false, rsx=0, rsy=0, rw0=0, rh0=0, rfs0=0;
  const startResize = e => {
    resizing=true;
    const t = e.touches ? e.touches[0] : e;
    rsx = t.clientX; rsy = t.clientY;
    const rect = el.getBoundingClientRect();
    rw0 = rect.width; rh0 = rect.height;
    rfs0 = parseFloat(getComputedStyle(el).fontSize) || 14;
    e.stopPropagation(); e.preventDefault();
  };
  const moveResize = e => {
    if (!resizing) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - rsx;
    const stageRect = stage.getBoundingClientRect();
    if (ann.type === 'highlight'){
      const nw = Math.max(minPx, rw0 + dx);
      const nh = Math.max(8, rh0 + (t.clientY - rsy));
      ann.w = nw / stageRect.width;
      ann.h = nh / stageRect.height;
      el.style.width = nw+'px';
      el.style.height = nh+'px';
    } else {
      // Text or stamp: resize via font size (use horizontal delta)
      const scale = Math.max(0.4, (rw0 + dx) / Math.max(rw0, 40));
      const nfs = Math.max(8, Math.min(96, rfs0 * scale));
      ann.size = nfs;
      el.style.fontSize = nfs + 'px';
    }
  };
  const endResize = () => { if (resizing){ resizing=false; onChange(); } };
  hr.addEventListener('mousedown', startResize);
  hr.addEventListener('touchstart', startResize, {passive:false});
  document.addEventListener('mousemove', moveResize);
  document.addEventListener('touchmove', moveResize, {passive:false});
  document.addEventListener('mouseup', endResize);
  document.addEventListener('touchend', endResize);

  // Delete handle
  const hd = document.createElement('div'); hd.className='ph-handle del'; hd.textContent='×';
  hd.addEventListener('mousedown', e => e.stopPropagation());
  hd.addEventListener('click', e => { e.stopPropagation(); onDelete(); });
  el.appendChild(hd);

  // Double-click to edit text
  if (ann.type === 'text'){
    el.addEventListener('dblclick', e => {
      e.stopPropagation();
      el.classList.add('editing');
      const cur = ann.text;
      el.innerHTML = `<input value="${cur.replace(/"/g,'&quot;')}" />`;
      const inp = el.querySelector('input');
      inp.focus(); inp.select();
      const finish = () => {
        ann.text = inp.value || cur;
        el.classList.remove('editing');
        el.textContent = ann.text;
        // re-attach handles
        el.appendChild(hr); el.appendChild(hd);
        onChange();
      };
      inp.addEventListener('blur', finish);
      inp.addEventListener('keydown', ev => { if (ev.key === 'Enter'){ ev.preventDefault(); inp.blur(); } });
    });
  }
}

          <div class="card">

    if (innerWidth < 900) document.getElementById('anGrid').style.gridTemplateColumns='1fr';
    document.querySelectorAll('[data-t]').forEach(b => b.onclick = () => { tool = b.dataset.t; paint(); });

      tcT.oninput = e => { if (/^#[0-9a-f]{6}$/i.test(e.target.value)){ textColor = e.target.value; tc.value = textColor; } };
    }
    if (tool==='highlight'){
      document.querySelectorAll('[data-hl]').forEach(b => b.onclick = () => { hlColor = b.dataset.hl; paint(); });
      const hc = document.getElementById('anHc'), hcT = document.getElementById('anHcT');
      hc.oninput = e => { hlColor = e.target.value; hcT.value = hlColor; paint(); };
      hcT.oninput = e => { if (/^#[0-9a-f]{6}$/i.test(e.target.value)){ hlColor = e.target.value; hc.value = hlColor; paint(); } };
    }
    if (tool==='stamp') document.getElementById('anStK').onchange = e => stampKind = e.target.value;
    if (tool==='draw'){
      document.querySelectorAll('[data-pen]').forEach(b => b.onclick = () => { penColor = b.dataset.pen; paint(); });
      const pc = document.getElementById('anPc'), pcT = document.getElementById('anPcT');
      pc.oninput = e => { penColor = e.target.value; pcT.value = penColor; };
      pcT.oninput = e => { if (/^#[0-9a-f]{6}$/i.test(e.target.value)){ penColor = e.target.value; pc.value = penColor; } };
      const ps = document.getElementById('anPs');
      ps.oninput = e => { penSize = +e.target.value; document.getElementById('anPsL').textContent = penSize+'px'; };
      document.getElementById('anClrDraw').onclick = () => { anns = anns.filter(a => !(a.type==='draw' && a.page===page)); paint(); };
    }
    if (pdf.numPages > 1){
      document.getElementById('anPrev').onclick = () => { if (page>1){page--; paint();} };
      document.getElementById('anNext').onclick = () => { if (page<pdf.numPages){page++; paint();} };
    }
    document.getElementById('anSave').onclick = doSave;
    const stage = document.getElementById('anStage');
    if (tool==='draw'){
      // Free-draw mode: mousedown starts a stroke, mousemove appends points, mouseup ends.
      let active = null;
      const start = (e) => {
        if (e.target.closest('.placement')) return;
        e.preventDefault();
        const r = stage.getBoundingClientRect();
        const x = (e.clientX-r.left)/r.width, y = (e.clientY-r.top)/r.height;
        active = { id:'a'+Math.random().toString(36).slice(2), page, type:'draw', color:penColor, size:penSize, points:[[x,y]] };
        anns.push(active);
        drawPage();
      };
      const move = (e) => {
        if (!active) return;
        const r = stage.getBoundingClientRect();
        const x = (e.clientX-r.left)/r.width, y = (e.clientY-r.top)/r.height;
        // Avoid storing duplicate points
        const last = active.points[active.points.length-1];
        if (Math.hypot(x-last[0], y-last[1]) > 0.002){
          active.points.push([x,y]);
          drawPage();
        }
      };
      const end = () => { active = null; };
      stage.addEventListener('mousedown', start);
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', end);
      stage.addEventListener('touchstart', e => start(e.touches[0]), {passive:false});
      stage.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0]); }, {passive:false});
      stage.addEventListener('touchend', end);
    } else {
      stage.onclick = e => {
        if (e.target.closest('.placement')) return;
        stage.querySelectorAll('.placement.selected').forEach(p => p.classList.remove('selected'));
        const r = e.currentTarget.getBoundingClientRect();
        const x = (e.clientX-r.left)/r.width, y = (e.clientY-r.top)/r.height;
        const id = 'a'+Math.random().toString(36).slice(2);
        if (tool==='text'){ if (!textIn.trim()) return; anns.push({id,page,type:'text',x,y,text:textIn,size:textSize,color:textColor}); }
        else if (tool==='highlight') anns.push({id,page,type:'highlight',x,y,w:0.20,h:0.030,color:hlColor});
        else anns.push({id,page,type:'stamp',x,y,kind:stampKind,size:14});
        drawPage();
      };
    }
    drawPage();
  }
  async function drawPage(){
    const p = await pdf.getPage(page);
    const vp = p.getViewport({scale:1.2});
    const c = document.getElementById('anCanvas');
    const dpr = devicePixelRatio||1;
    c.width = vp.width*dpr; c.height = vp.height*dpr;
    c.style.width=vp.width+'px'; c.style.height=vp.height+'px';
    const ctx = c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    await p.render({canvasContext:ctx, viewport:vp, canvas:c}).promise;
    const stage = document.getElementById('anStage');
    stage.querySelectorAll('.placement, .draw-layer').forEach(e=>e.remove());
    // Render free-draw strokes as one absolutely positioned SVG layer
    const drawAnns = anns.filter(a => a.page===page && a.type==='draw');
    if (drawAnns.length){
      const ns = 'http://www.w3.org/2000/svg';
      const layer = document.createElementNS(ns, 'svg');
      layer.setAttribute('class','draw-layer');
      layer.setAttribute('viewBox', `0 0 ${vp.width} ${vp.height}`);
      layer.setAttribute('width', vp.width);
      layer.setAttribute('height', vp.height);
      layer.style.cssText = `position:absolute;left:0;top:0;width:${vp.width}px;height:${vp.height}px;pointer-events:none`;
      drawAnns.forEach(a => {
        if (a.points.length < 2){
          // Single dot
          const cir = document.createElementNS(ns,'circle');
          cir.setAttribute('cx', a.points[0][0]*vp.width);
          cir.setAttribute('cy', a.points[0][1]*vp.height);
          cir.setAttribute('r', (a.size||3)/2);
          cir.setAttribute('fill', a.color||'#dc2626');
          layer.appendChild(cir);
        } else {
          const path = document.createElementNS(ns,'path');
          const d = a.points.map((p,i) => `${i?'L':'M'}${p[0]*vp.width} ${p[1]*vp.height}`).join(' ');
          path.setAttribute('d', d);
          path.setAttribute('stroke', a.color||'#dc2626');
          path.setAttribute('stroke-width', a.size||3);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke-linecap', 'round');
          path.setAttribute('stroke-linejoin', 'round');
          layer.appendChild(path);
        }
      });
      stage.appendChild(layer);
    }
    // Render placements (text / highlight / stamp)
    anns.filter(a=>a.page===page && a.type!=='draw').forEach(a => {
      const d = document.createElement('div'); d.className='placement '+a.type;
      d.style.left=(a.x*100)+'%'; d.style.top=(a.y*100)+'%';
      if (a.type==='text'){
        d.style.fontSize = (a.size||16)+'px';
        if (a.color) d.style.color = a.color;
        d.textContent = a.text;
      } else if (a.type==='highlight'){
        d.style.width=(a.w*vp.width)+'px';
        d.style.height=(a.h*vp.height)+'px';
        if (a.color) d.style.background = a.color + '73';
      } else if (a.type==='stamp'){
        const cc=STAMP_C[a.kind];
        d.style.color=cc; d.style.borderColor=cc; d.style.background=`${cc}1a`;
        d.style.fontSize=(a.size||14)+'px';
        d.textContent = tt('annotate.'+a.kind);
      }
      stage.appendChild(d);
      makeInteractive(d, a, {
        stage,
        onChange: () => {},
        onDelete: () => { anns = anns.filter(x => x.id !== a.id); drawPage(); }
      });
    });
  }
  window.__an_clr = () => { file=null; pdf=null; anns=[]; window.__pdfFile=null; paint(); };
  window.__an_resetAnns = () => { anns=[]; paint(); };
  async function doSave(){
    if (!anns.length) return;
    const btn = document.getElementById('anSave'); btn.disabled = true;
    try {
      const doc = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      const fnt = await doc.embedFont(StandardFonts.Helvetica);
      const fntB = await doc.embedFont(StandardFonts.HelveticaBold);
      const pages = doc.getPages();
      anns.forEach(a => {
        const pg = pages[a.page-1]; if (!pg) return;
        const {width, height} = pg.getSize();
        const x = a.x*width, y = height - a.y*height;
        if (a.type==='text'){
          const sz = (a.size||16);
          const w = fnt.widthOfTextAtSize(a.text, sz);
          const tc = hexToRgb(a.color || '#1e1b4b');
          pg.drawText(a.text, {x:x - w/2, y:y - sz/2, size:sz, font:fnt, color:rgb(tc[0],tc[1],tc[2])});
        }
        else if (a.type==='highlight'){
          const w = a.w*width, h = a.h*height;
          const hc = hexToRgb(a.color || '#facc15');
          pg.drawRectangle({x, y:y-h/2, width:w, height:h, color:rgb(hc[0],hc[1],hc[2]), opacity:.4});
        } else if (a.type==='stamp'){
          const c = STAMP_C[a.kind]; const r=parseInt(c.slice(1,3),16)/255, g=parseInt(c.slice(3,5),16)/255, b=parseInt(c.slice(5,7),16)/255;
          const label = tt('annotate.'+a.kind).toUpperCase();
          const sz = Math.max(14, (a.size||14) * 1.6);
          const tw = fntB.widthOfTextAtSize(label,sz);
          const sw = tw + 28, sh = sz + 14;
          pg.drawRectangle({x:x-sw/2, y:y-sh/2, width:sw, height:sh, borderColor:rgb(r,g,b), borderWidth:3, color:rgb(r,g,b), opacity:.08, borderOpacity:.9});
          pg.drawText(label, {x:x-tw/2, y:y-sz/3, size:sz, font:fntB, color:rgb(r,g,b), opacity:.9});
        }
      });
      // Draw free-draw strokes — each stroke is a series of tiny line segments
      anns.filter(a => a.type==='draw').forEach(a => {
        const pg = pages[a.page-1]; if (!pg) return;
        const {width, height} = pg.getSize();
        const dc = hexToRgb(a.color || '#dc2626');
        const sw = (a.size || 3);
        if (a.points.length < 2){
          const px = a.points[0][0]*width, py = height - a.points[0][1]*height;
          pg.drawCircle({x:px, y:py, size:sw/2, color:rgb(dc[0],dc[1],dc[2])});
          return;
        }
        for (let i=1; i<a.points.length; i++){
          const [x1,y1] = a.points[i-1], [x2,y2] = a.points[i];
          pg.drawLine({
            start:{x:x1*width, y:height - y1*height},
            end:{x:x2*width, y:height - y2*height},
            thickness: sw,
            color: rgb(dc[0],dc[1],dc[2]),
            lineCap: LineCapStyle.Round
          });
        }
      });
      downloadBytes(await doc.save(), deriveName(file.name,'edited'));
      toast(tt('actions.done'));

async function renderCrop(main){
  main.innerHTML = `<div class="tool-page" style="max-width:1100px">${toolHead('crop')}<div id="ccard"></div></div>`;
  const card = document.getElementById('ccard');
  let file=null, pdf=null, page=1, scope='current', sel=null;

  async function paint(){
    if (!file){ card.innerHTML = `<div class="card">${dropzone({onFiles: async fs => { file=fs[0]; try { pdf=await loadPdfJs(await file.arrayBuffer()); } catch { toast(tt('errors.invalid'),'error'); file=null; paint(); return; } sel=null; page=1; paint(); }})}</div>`; return; }
    card.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 280px;gap:16px" id="cGrid">
        <div class="card" style="background:color-mix(in srgb,var(--bg) 50%,#000 4%);display:flex;justify-content:center;padding:18px;min-height:400px;overflow:auto">
          <div class="doc-stage" id="cStage" style="cursor:crosshair;user-select:none">
            <canvas id="cCanvas"></canvas>
            <div id="cBox" style="position:absolute;border:2px dashed #1e40af;background:rgba(30,64,175,.12);display:none;pointer-events:none"></div>
            <div id="cMask" style="position:absolute;inset:0;pointer-events:none;display:none">
              <div style="position:absolute;inset:0;box-shadow:inset 0 0 0 9999px rgba(15,23,42,.45)"></div>
            </div>
          </div>
        </div>
        <div>
          <div class="card">
            <div style="font-weight:600;margin-bottom:8px">${file.name}</div>
            <div style="color:var(--muted);font-size:13px">${tt('crop.area')}: <span id="cInfo">${sel? Math.round(sel.w*100)+'% × '+Math.round(sel.h*100)+'%' : '—'}</span></div>
          </div>
          <div class="card">
            <div class="field"><label>${tt('crop.apply')}</label>
              <select class="select" id="cScope">
                <option value="current" ${scope==='current'?'selected':''}>${tt('crop.currentPage')}</option>
                <option value="all" ${scope==='all'?'selected':''}>${tt('crop.allPages')}</option>
              </select>
            </div>
            <button class="btn btn-outline btn-sm" id="cReset" style="width:100%;margin-bottom:8px">${tt('crop.reset')}</button>
          </div>
          ${pdf.numPages>1?`<div class="card" style="display:flex;justify-content:space-between;align-items:center"><button class="btn btn-ghost btn-sm" id="cPrev">${tt('actions.prev')}</button><span style="font-size:13px">${page} / ${pdf.numPages}</span><button class="btn btn-ghost btn-sm" id="cNext">${tt('actions.next')}</button></div>`:''}
          <div class="card">
            <div style="display:flex;gap:8px">
              <button class="btn btn-outline" style="flex:1" id="cClr">${tt('actions.back')}</button>
              <button class="btn" style="flex:1" id="cDo">${svg('arrowDown')} ${tt('crop.action')}</button>
            </div>
          </div>
        </div>
      </div>`;
    if (innerWidth < 900) document.getElementById('cGrid').style.gridTemplateColumns='1fr';
    document.getElementById('cScope').onchange = e => scope = e.target.value;
    document.getElementById('cReset').onclick = () => { sel=null; paint(); };
    document.getElementById('cClr').onclick = () => { file=null; pdf=null; sel=null; paint(); };
    document.getElementById('cDo').onclick = doSave;
    if (pdf.numPages>1){
      document.getElementById('cPrev').onclick = () => { if (page>1){page--; paint();} };
      document.getElementById('cNext').onclick = () => { if (page<pdf.numPages){page++; paint();} };
    }
    await drawPage();
    bindDrag();
  }

  async function drawPage(){
    const p = await pdf.getPage(page);
    const vp = p.getViewport({scale:1.2});
    const c = document.getElementById('cCanvas');
    const dpr = devicePixelRatio||1;
    c.width = vp.width*dpr; c.height = vp.height*dpr;
    c.style.width=vp.width+'px'; c.style.height=vp.height+'px';
    const ctx = c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    await p.render({canvasContext:ctx, viewport:vp, canvas:c}).promise;
    paintBox();
  }

  function paintBox(){
    const stage = document.getElementById('cStage');
    const box = document.getElementById('cBox');
    if (!sel){ box.style.display='none'; return; }
    const w = stage.clientWidth, h = stage.clientHeight;
    box.style.display='block';
    box.style.left = (sel.x*w)+'px';
    box.style.top = (sel.y*h)+'px';
    box.style.width = (sel.w*w)+'px';
    box.style.height = (sel.h*h)+'px';
    const info = document.getElementById('cInfo');
    if (info) info.textContent = Math.round(sel.w*100)+'% × '+Math.round(sel.h*100)+'%';
  }

  function bindDrag(){
    const stage = document.getElementById('cStage');
    let start = null;
    const begin = (e) => {
      e.preventDefault();
      const r = stage.getBoundingClientRect();
      start = { x:(e.clientX-r.left)/r.width, y:(e.clientY-r.top)/r.height };
      sel = { x:start.x, y:start.y, w:0, h:0 };
      paintBox();
    };
    const move = (e) => {
      if (!start) return;
      const r = stage.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
      const y = Math.max(0, Math.min(1, (e.clientY-r.top)/r.height));
      sel = { x:Math.min(start.x,x), y:Math.min(start.y,y), w:Math.abs(x-start.x), h:Math.abs(y-start.y) };
      paintBox();
    };
    const end = () => {
      if (start && (sel.w<0.01 || sel.h<0.01)) sel = null;
      start = null;
      paintBox();
    };
    stage.addEventListener('mousedown', begin);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    stage.addEventListener('touchstart', e => begin(e.touches[0]), {passive:false});
    stage.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0]); }, {passive:false});
    stage.addEventListener('touchend', end);
  }

  async function doSave(){
    if (!sel || sel.w<0.02 || sel.h<0.02){ toast(tt('crop.noArea'),'error'); return; }
    const btn = document.getElementById('cDo'); btn.disabled = true;
    try {
      const doc = await PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
      const pages = doc.getPages();
      const targets = scope==='all' ? pages.map((_,i)=>i) : [page-1];
      targets.forEach(i => {
        const pg = pages[i]; if (!pg) return;
        const {width, height} = pg.getSize();
        const x = sel.x*width;
        const w = sel.w*width;
        const yTop = sel.y*height;
        const h = sel.h*height;
        // PDF origin is bottom-left, so flip y
        const y = height - yTop - h;
        pg.setCropBox(x, y, w, h);
        pg.setMediaBox(x, y, w, h);
      });
      downloadBytes(await doc.save(), deriveName(file.name,'cropped'));
      toast(tt('actions.done'));
    } catch(e){ console.error(e); toast(tt('errors.generic'),'error'); }
    finally { btn.disabled = false; }
  }

  paint();
}
